id: benchmark-002-https

version: 1.0

title: HTTPS Baseline

description: Baseline HTTPS benchmark with TLS termination.

benchmark:
  tools:
    - wrk
    - vegeta
  protocol: https
  url: https://localhost:8443/api

torus:
  config: torus-https.yaml

workload:
  threads: 2
  connections: 100
  duration: 30s
  warmup: 30s
  iterations: 20
  rate: 500

request:
  method: GET
  payload: 1KB

environment:
  hardware_profile: H001
  environment_profile: E001
  software_profile: S001
  methodology_version: 1.0

monitoring:
  pidstat: true
  vmstat: true
  ss: true
  pprof: false
  perf: false

output:
  dataset: benchmark-002-B-https
  report: benchmark-002-B-https.md
