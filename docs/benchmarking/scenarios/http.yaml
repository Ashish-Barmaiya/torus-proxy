id: benchmark-002-http

version: 1.0

title: HTTP Baseline

description: Baseline HTTP benchmark without TLS termination.

benchmark:
  tool:
    - wrk
    - vegeta
  protocol: http
  url: http://localhost:8080/api

workload:
  threads: 2
  connections: 100
  duration: 30s
  warmup: 30s
  iterations: 20
  rate: 500

request:
  method: GET
  payload: 1KB

environment:
  hardware_profile: H001
  environment_profile: E001
  software_profile: S001
  methodology_version: 1.0

monitoring:
  pidstat: true
  vmstat: true
  ss: true
  pprof: false
  perf: false

output:
  dataset: benchmark-002/http
  report: benchmark-002-tls-termination.md
